<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Walkman Player - interaktiver Musikplayer" />
  <meta name="theme-color" content="#070707" />
  <title>Walkman Player</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>
  <header class="header">
    <div class="container"><h1 class="logo">Walkman Player</h1></div>
  </header>

  <main class="app">
    <section class="viewer-section">
      <div class="viewer-wrapper">
        <model-viewer id="walkmanViewer" src="assets/models/walkman.glb" alt="3D Walkman" camera-controls touch-action="pan-y" shadow-intensity="1.2" exposure="1" environment-image="neutral" loading="eager"></model-viewer>
        <div class="model-fallback">3D-Modell optional: assets/models/walkman.glb</div>
        <button id="fullscreenBtn" type="button">Vollbild</button>
      </div>
    </section>

    <section class="player-section">
      <figure class="album-cover"><img id="coverImage" src="assets/images/SCHICKSALS.jpeg" alt="Albumcover" /></figure>
      <h2 id="trackTitle">Black is back</h2>
      <p id="trackArtist">Phil Osophski</p>

      <div class="time-row"><span id="currentTime">00:00</span><span id="duration">00:00</span></div>
      <input id="progressBar" type="range" min="0" max="100" value="0" step="0.01" aria-label="Fortschritt" />

      <section class="controls-section" aria-label="Playersteuerung">
        <button id="previousBtn" type="button">⏮</button>
        <button id="playBtn" type="button">▶</button>
        <button id="pauseBtn" type="button">⏸</button>
        <button id="stopBtn" type="button">⏹</button>
        <button id="nextBtn" type="button">⏭</button>
        <button id="shuffleBtn" type="button">Shuffle</button>
        <button id="repeatBtn" type="button">Repeat</button>
      </section>

      <section class="volume-section">
        <label for="volumeSlider">Lautstärke</label>
        <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.9" />
        <button id="muteBtn" type="button">Mute</button>
      </section>

      <section class="playlist-section">
        <h3>Playlist</h3>
        <ol id="playlist"></ol>
      </section>

      <section class="visualizer-section"><canvas id="visualizerCanvas"></canvas></section>
    </section>
  </main>

  <footer><small>Walkman Player · Version 1.0.0</small></footer>
  <audio id="audioPlayer" preload="metadata"></audio>

  <script src="js/audio.js"></script>
  <script src="js/playlist.js"></script>
  <script src="js/visualizer.js"></script>
  <script src="js/walkman.js"></script>
  <script src="js/player.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
